name: Android CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  BuildRelease:
    name: Release • ${{ matrix.arch }}
    if: github.repository_owner == 'ZalithLauncher' && github.event_name != 'pull_request' && github.ref_name == 'main'
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    strategy:
      matrix:
        arch: [all, arm, arm64, x86, x86_64]
      fail-fast: false

    env:
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
      MOVTERY_KEYSTORE_PASSWORD: ${{ secrets.MOVTERY_KEYSTORE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set build type
        shell: bash
        run: |
          COMMIT_MSG="$(git log -1 --pretty=%B)"
          BUILD_TYPE="DEBUG"

          if [[ "$COMMIT_MSG" == *"pre-release"* ]]; then
            BUILD_TYPE="PRE_RELEASE"
          elif [[ "$COMMIT_MSG" == *"release"* ]]; then
            BUILD_TYPE="RELEASE"
          fi

          echo "ZL_BUILD_TYPE=${BUILD_TYPE}" >> "$GITHUB_ENV"
          echo "Commit message: $COMMIT_MSG"
          echo "Resolved build type: $BUILD_TYPE"

      - name: Build JRE JAR files
        run: |
          mkdir -p out
          ./gradlew jre_lwjgl3glfw:build --no-daemon --stacktrace

      - name: Build Release ${{ matrix.arch }}
        run: |
          ./gradlew ZalithLauncher:assembleRelease -Darch=${{ matrix.arch }} --no-daemon --stacktrace

      - name: Upload Release ${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        with:
          name: ZalithLauncher-Release-${{ matrix.arch }}
          path: ZalithLauncher/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14

  BuildDebug:
    name: Debug • ${{ matrix.arch }}
    if: github.event_name == 'pull_request' || github.ref_name != 'main' || github.repository_owner != 'ZalithLauncher'
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    strategy:
      matrix:
        arch: [all, arm, arm64, x86, x86_64]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build JRE JAR files
        run: |
          mkdir -p out
          ./gradlew jre_lwjgl3glfw:build --no-daemon --stacktrace

      - name: Build Debug ${{ matrix.arch }}
        run: |
          ./gradlew ZalithLauncher:assembleDebug -Darch=${{ matrix.arch }} --no-daemon --stacktrace

      - name: Upload Debug ${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        with:
          name: ZalithLauncher-Debug-${{ matrix.arch }}
          path: ZalithLauncher/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
